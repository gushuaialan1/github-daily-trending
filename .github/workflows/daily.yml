name: Daily GitHub Trending

on:
  schedule:
    # 每天北京时间 9:00 运行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Generate trending report
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
      run: |
        python generate.py
    
    - name: Send notifications
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        python notify.py
    
    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/ data/
        git diff --staged --quiet || git commit -m "Update trending report for $(date +%Y-%m-%d)"
        git push

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './docs'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
    
    - name: Notify (optional)
      if: success()
      run: |
        echo "Deployed to ${{ steps.deployment.outputs.page_url }}"
        echo "Latest report: ${{ steps.deployment.outputs.page_url }}/latest.html"
